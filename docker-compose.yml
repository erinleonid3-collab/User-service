version: '3.8'

services:

  db:
    image: postgres:16-alpine
    container_name: user_service_db
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: 1996
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  app:
    build: .
    container_name: user_service_app
    depends_on:
      - db
    stdin_open: true
    tty: true

volumes:
  postgres_data: